{% if page_obj.has_other_pages %}
<nav class="mt-3">
    <ul class="pagination pagination-sm">
        {% if page_obj.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?{% if termo_busca %}q={{ termo_busca }}&{% endif %}page={{ page_obj.previous_page_number }}">Anterior</a>
            </li>
        {% endif %}
        <li class="page-item disabled">
            <span class="page-link">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
        </li>
        {% if page_obj.has_next %}
            <li class="page-item">
                <a class="page-link" href="?{% if termo_busca %}q={{ termo_busca }}&{% endif %}page={{ page_obj.next_page_number }}">Próxima</a>
            </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
