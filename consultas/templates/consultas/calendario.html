{% extends 'base.html' %}
{% load static %}

{% block title %}Calendário de Consultas{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Calendário de Consultas</h1>
        <a href="{% url 'consultas:lista' %}" class="btn btn-outline-secondary">Ver em lista</a>
    </div>

    {{ dados_consultas|json_script:"consultas-data" }}

    <div class="row">
        <div class="col-md-8">
            <div id="calendario-container"></div>
        </div>
        <div class="col-md-4">
            <div id="lista-consultas-dia">
                <p class="text-muted">Clique em um dia com consultas para ver os detalhes.</p>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/calendario.js' %}"></script>
{% endblock %}
